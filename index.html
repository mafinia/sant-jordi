<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sant Jordi 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(#fff0f3, #ffe5ec);
    text-align:center;
    overflow:hidden;
}

.hidden { display:none; }

button {
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#e63946;
    color:white;
    cursor:pointer;
}

img {
    max-width:300px;
    margin:20px;
}

/* pétalos */
.petal {
    position:fixed;
    top:-10px;
    width:12px;
    height:18px;
    background: radial-gradient(circle at 30% 30%, #ff8fa3, #e63946);
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="screen1">
    <h2>Introduce la fecha</h2>
    <input type="date" id="dateInput">
    <br><br>
    <button onclick="checkDate()">Entrar</button>
    <p id="msg"></p>
</div>

<!-- PANTALLA 2 -->
<div id="screen2" class="hidden">
    <h2>Feliç Sant Jordi! 🌹</h2>
    <button id="continueBtn" class="hidden" onclick="goToPackage()">Continuar</button>
</div>

<!-- PANTALLA 3 -->
<div id="screen3" class="hidden">
    <h2>📦 Tu paquete</h2>
    <div id="packageArea">
        <img src="paquete.jpg" id="packageImg">
    </div>
    <br>
    <button onclick="function shake(){
    let img = document.getElementById("packageImg");

    // pequeño efecto de sacudida
    img.style.transform = "translateX(5px)";
    setTimeout(()=> img.style.transform = "translateX(-5px)", 100);
    setTimeout(()=> img.style.transform = "translateX(5px)", 200);
    setTimeout(()=> img.style.transform = "translateX(0px)", 300);

    document.getElementById("packageMsg").innerText =
    "Efectivamente, hay algo dentro.";
}">Sacudir</button>
    <button onclick="shake()">Sacudir</button>
    <button onclick="openCarefully()">Abrir con cuidado</button>
    <button onclick="destroy()">Romper envoltorio</button>
    <p id="packageMsg"></p>
</div>

<!-- CONTENIDO -->
<div id="screen4" class="hidden">
    <h2>¿Por dónde quieres empezar?</h2>
<p style="font-size:18px; color:#6d6875;">Puedes elegir cualquier opción… pero tendrás que descubrirlas todas</p>

    <img src="carta01.jpg" onclick="openCarta()">
    <img src="bolsa_cerrada01.jpg" onclick="openBolsa()">
    <img src="caja_interrogante01.jpg" onclick="openLibro()">
</div>

<!-- INTERACCIÓN -->
<div id="interaction" class="hidden">
    <div id="interactionContent"></div>
    <button onclick="nextItem()">Siguiente</button>
</div>

<!-- FINAL -->
<div id="final" class="hidden">
    <h2>🌹</h2>
    <h2>Una tiene que ser original</h2>
    <h3>cuando los costes de envío están por las nubes</h3>
    <p>#FuckBrexit</p>
</div>

<script>

let seen = { carta:false, bolsa:false, libro:false };

function checkDate() {
    let input = document.getElementById("dateInput").value;
    let selected = new Date(input);
    let limit = new Date("2026-04-23");

    if (selected < limit) {
        document.getElementById("msg").innerText =
        "Acceso restringido, vuelva a intentarlo más adelante.";
    } else {
        document.getElementById("screen1").classList.add("hidden");
        document.getElementById("screen2").classList.remove("hidden");
        startPetals();

        setTimeout(()=>{
            document.getElementById("continueBtn").classList.remove("hidden");
        },5000);
    }
}

function startPetals(){
    setInterval(()=>{
        let petal = document.createElement("div");
        petal.classList.add("petal");
        petal.style.left = Math.random()*100+"vw";
        petal.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(petal);
        setTimeout(()=>petal.remove(),5000);
    },300);
}

function goToPackage(){
    document.getElementById("screen2").classList.add("hidden");
    document.getElementById("screen3").classList.remove("hidden");
}

function function shake(){
    let img = document.getElementById("packageImg");

    // pequeño efecto de sacudida
    img.style.transform = "translateX(5px)";
    setTimeout(()=> img.style.transform = "translateX(-5px)", 100);
    setTimeout(()=> img.style.transform = "translateX(5px)", 200);
    setTimeout(()=> img.style.transform = "translateX(0px)", 300);

    document.getElementById("packageMsg").innerText =
    "Efectivamente, hay algo dentro.";
}{
    document.getElementById("packageMsg").innerText =
    "Efectivamente, hay algo dentro.";
}

/* STOP MOTION ABRIR CON CUIDADO */
function openCarefully(){
    let frames = [
        "paquete.jpg",
        "paquete_abriendo01.jpg",
        "paquete_abriendo02.jpg",
        "paquete_abriendo03.jpg",
        "paquete_abriendo04.jpg",
        "paquete_abriendo05.jpg",
        "paquete_abriendo06.jpg",
        "caja_cerrada.jpg"
    ];

    playSequence(frames, showBoxOpening);
}

/* STOP MOTION ROMPER */
function destroy(){
    let frames = [
        "paquete_romper01.jpg",
        "paquete_romper02.jpg",
        "paquete_romper03.jpg",
        "paquete_romper04.jpg",
        "paquete_romper05.jpg",
        "paquete_romper06.jpg",
        "paquete_romper07.jpg",
        "paquete_romper08.jpg",
        "caja_cerrada.jpg"
    ];

    playSequence(frames, showBoxOpening);
}

/* ABRIR CAJA */
function showBoxOpening(){
    let frames = [
        "caja_abierta01.jpg",
        "caja_abierta02.jpg"
    ];

    playSequence(frames, showContent);
}

/* FUNCIÓN GENERAL STOP MOTION */
function playSequence(frames, callback){
    let i = 0;
    let img = document.getElementById("packageImg");

    let interval = setInterval(()=>{
        img.src = frames[i];
        i++;

        if(i >= frames.length){
            clearInterval(interval);
            setTimeout(callback, 800);
        }
    },400);
}

function showContent(){
    document.getElementById("screen3").classList.add("hidden");
    document.getElementById("screen4").classList.remove("hidden");
}

/* CARTA */
function openCarta(){
    seen.carta = true;

    let frames = ["carta01.jpg","carta02.jpg","carta03.jpg","carta04.jpg"];
    playInteraction(frames);
}

/* BOLSA */
function openBolsa(){
    seen.bolsa = true;

    let frames = ["bolsa_cerrada01.jpg","bolsa_cerrada02.jpg","iman.jpg"];
    playInteraction(frames);
}

/* LIBRO */
function openLibro(){
    seen.libro = true;

    let frames = ["caja_interrogante01.jpg","libro.jpg"];
    playInteraction(frames);
}

/* INTERACCIONES */
function playInteraction(frames){
    let i = 0;

    document.getElementById("screen4").classList.add("hidden");
    document.getElementById("interaction").classList.remove("hidden");

    let interval = setInterval(()=>{
        document.getElementById("interactionContent").innerHTML =
        "<img src='"+frames[i]+"'>";
        i++;

        if(i >= frames.length){
            clearInterval(interval);
        }
    },500);
}

function nextItem(){
    document.getElementById("interaction").classList.add("hidden");

    if(seen.carta && seen.bolsa && seen.libro){
        document.getElementById("final").classList.remove("hidden");
    } else {
        document.getElementById("screen4").classList.remove("hidden");
    }
}

</script>

<audio autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

</body>
</html>
